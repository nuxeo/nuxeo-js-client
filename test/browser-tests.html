<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Nuxeo JS Client - Browser Tests</title>
  <link rel="stylesheet" href="/node_modules/mocha/mocha.css">
</head>
<body>
  <div id="mocha"></div>

  <!-- Mocha setup (must come before test bundle) -->
  <script src="/node_modules/mocha/mocha.js"></script>
  <script>
    mocha.setup({ ui: 'bdd', timeout: 30000 });
  </script>

  <!-- Nuxeo library bundle -->
  <script src="/__JS_DIST_DIR__/nuxeo.js"></script>

  <!-- Browser globals expected by the test suite -->
  <script>
    window.baseURL = '__NUXEO_BASE_URL__';
    window.isBrowser = true;
    window.support = { readBlob: 'FileReader' in window };
  </script>

  <!-- Browserified test bundle (includes setup.js, setup-browser.js, all *.spec.js) -->
  <script src="/__JS_BUILD_DIR__/tests.js"></script>

  <!-- Run Mocha and collect results for WDIO bridge -->
  <script>
    window.__mochaResults__ = {
      completed: false,
      passed: 0,
      failed: 0,
      pending: 0,
      tests: []
    };

    var runner = mocha.run(function onComplete() {
      window.__mochaResults__.completed = true;
    });

    runner.on('pass', function(test) {
      window.__mochaResults__.passed++;
      window.__mochaResults__.tests.push({
        title: test.title,
        fullTitle: test.fullTitle(),
        state: 'passed',
        duration: test.duration
      });
    });

    runner.on('fail', function(test, err) {
      window.__mochaResults__.failed++;
      window.__mochaResults__.tests.push({
        title: test.title,
        fullTitle: test.fullTitle(),
        state: 'failed',
        duration: test.duration,
        error: err.message,
        stack: err.stack
      });
    });

    runner.on('pending', function(test) {
      window.__mochaResults__.pending++;
      window.__mochaResults__.tests.push({
        title: test.title,
        fullTitle: test.fullTitle(),
        state: 'pending'
      });
    });
  </script>
</body>
</html>
